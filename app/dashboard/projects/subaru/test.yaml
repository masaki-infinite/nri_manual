jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        entrypoint: /usr/local/bin/custom-entrypoint.sh  # ← NEW
        command: >-                                        # ← NEW
          postgres
          -c shared_preload_libraries=pg_stat_statements
          -c max_connections=200
        ports:
          - 5432:5432
